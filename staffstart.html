<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libber Staff Start</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f0ea;
      --surface: #fffdf8;
      --border: rgba(30, 30, 25, 0.14);
      --border-strong: rgba(30, 30, 25, 0.34);
      --text: #1d1a14;
      --muted: #736b5d;
      --accent: #945f20;
      --accent-soft: #f5e6d1;
      --danger: #a33d2f;
      --mono: 'DM Mono', monospace;
      --ui: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      font-family: var(--ui);
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(148, 95, 32, 0.10), transparent 24%),
        linear-gradient(180deg, #f8f4ee 0%, var(--bg) 100%);
      padding: 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
    }

    h1 {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 0.95;
      margin-bottom: 10px;
    }

    .sub, .panel p, .status {
      color: var(--muted);
      font-size: 14px;
    }

    .my-id {
      margin-top: 14px;
      font-family: var(--mono);
      font-size: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.65);
      border: 1px dashed var(--border-strong);
      border-radius: 16px;
      word-break: break-all;
    }

    .picker {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      margin-top: 14px;
    }

    .pick-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
    }

    .pick-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .pick-title {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .pick-sub {
      display: block;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    .summary {
      font-size: 15px;
      margin-bottom: 14px;
    }

    .apply-btn {
      border: none;
      border-radius: 999px;
      background: var(--text);
      color: white;
      padding: 14px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    .apply-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .status.error {
      color: var(--danger);
    }

    .empty {
      color: var(--muted);
      padding: 16px 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Apply for staff access.</h1>
      <p class="sub">Pick the store you’re standing in, apply, then hand the screen to the manager for approval.</p>
      <div class="my-id">Your ID: <span id="myId">Loading...</span></div>
    </section>

    <section class="panel">
      <div class="summary">Selected store: <strong id="selectedStore">None selected</strong></div>
      <button class="apply-btn" id="applyBtn" disabled>Apply for staff</button>
      <p class="status" id="status"></p>
      <div class="picker" id="storeList">
        <p class="empty">Loading stores...</p>
      </div>
    </section>
  </main>

  <script type="module" src="/src/pages/staff/start.js"></script>
</body>
</html>
