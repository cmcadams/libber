<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libber Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 2rem; color: #111; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
    p.sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
    .staff-list { display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
    .staff-card {
      background: white;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .staff-card:hover { border-color: #888; }
    .staff-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .staff-card p { font-size: 13px; color: #666; }
    .loading { color: #666; font-size: 14px; }
    .error { color: #c0392b; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Libber Admin</h1>
  <p class="sub">Select a staff member to view their store</p>
  <div class="staff-list" id="staff-list">
    <p class="loading">Loading staff...</p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { saveSelectedStore } from './src/lib/storage.js'

    const SUPABASE_URL = import.meta.env?.VITE_SUPABASE_URL || window.__SUPABASE_URL__
    const SUPABASE_ANON_KEY = import.meta.env?.VITE_SUPABASE_ANON_KEY || window.__SUPABASE_ANON_KEY__

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const list = document.getElementById('staff-list')

    const { data, error } = await supabase
      .from('store_staff')
      .select('id, user_id, store_id, stores(name)')

if (error || !data?.length) {
  list.innerHTML = `<p class="error">${error?.message || 'No staff found'}</p>`
} else {
  list.innerHTML = ''
  data.forEach(staff => {
    const card = document.createElement('div')
    card.className = 'staff-card'
    card.innerHTML = `
      <h2>${staff.stores?.name || 'Unknown Store'}</h2>
      <p>Staff ID: ${staff.user_id}</p>
    `
    card.addEventListener('click', () => {
      saveSelectedStore(staff.store_id, staff.stores?.name)
      window.location.href = '/staffpage.html'
    })
    list.appendChild(card)
  })
}
  </script>
</body>
</html>
